{% extends "base.html" %}
{% from "base.html" import controls_and_presets %}

{% block title %}Infinite Tiling Explorer{% endblock %}

{% block content %}
    <h1>Infinite Tiling Explorer</h1>

    {{ controls_and_presets() }}

    <div class="controls">
        <label for="seed">Seed:</label>
        <input type="number" id="seed" value="12345">
        <button onclick="regenerate()">Generate</button>
        <button onclick="randomSeed()">Random</button>
    </div>

    <canvas id="canvas" width="800" height="600"></canvas>
    <script type="module" src="{{ url_for('static', filename='js/infinite.js') }}"></script>
{% endblock %}
